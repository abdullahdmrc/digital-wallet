apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallet-backend
  template:
    metadata:
      labels:
        app: wallet-backend
    spec:
      containers:
      - name: backend
        image: digital-wallet-api # Skaffold bunu otomatik dolduracak
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-backend-svc
spec:
  type: ClusterIP
  selector:
    app: wallet-backend
  ports:
  - port: 8080
    targetPort: 8080