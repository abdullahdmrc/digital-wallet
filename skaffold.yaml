apiVersion: skaffold/v4beta7
kind: Config
metadata:
  name: digital-wallet
build:
  artifacts:
  # 1. Backend İmajı
  - image: digital-wallet-api
    context: digitalwallet-backend
  # 2. Frontend İmajı (Klasör yolu compose dosyandaki gibi güncellendi)
  - image: digital-wallet-ui
    context: digitalwallet-frontend/digitalwalletapp
manifests:
  rawYaml:
  - deploy/backend-manifest.yaml
  - deploy/frontend-manifest.yaml
deploy:
  kubectl: {}